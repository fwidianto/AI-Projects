<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opportunities - AI Executive Advisor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f3f4f6;
            padding: 24px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 1.5rem; margin-bottom: 24px; color: #111827; }
        .opp-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 16px;
        }
        .opp-card {
            background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);
            border-radius: 16px;
            padding: 24px;
            border-left: 4px solid #10b981;
        }
        .opp-type {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #059669;
            margin-bottom: 8px;
        }
        .opp-title { font-size: 1.125rem; font-weight: 600; color: #111827; margin-bottom: 8px; }
        .opp-impact {
            font-size: 1.5rem;
            font-weight: 700;
            color: #059669;
            margin-bottom: 8px;
        }
        .opp-reasoning { font-size: 0.875rem; color: #4b5563; }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #6366f1;
            text-decoration: none;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/ai-advisor" class="back-link">← Back to AI Advisor</a>
        <h1>💡 Identified Opportunities</h1>
        
        <div class="opp-grid">
            {% for opp in opportunities %}
            <div class="opp-card">
                <div class="opp-type">{{ opp.type }}</div>
                <div class="opp-title">{{ opp.title }}</div>
                <div class="opp-impact">{{ opp.impact }}</div>
                <div class="opp-reasoning">{{ opp.reasoning }}</div>
            </div>
            {% else %}
            <p style="grid-column: 1/-1; text-align: center; padding: 60px; color: #6b7280;">
                No specific opportunities identified at this time.
            </p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
