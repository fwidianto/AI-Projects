<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risk Report - AI Executive Advisor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f3f4f6;
            padding: 24px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 1.5rem; margin-bottom: 24px; color: #111827; }
        .risk-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            display: flex;
            gap: 20px;
        }
        .risk-score {
            width: 100px;
            height: 100px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        .risk-score.Critical { background: #fee2e2; color: #991b1b; }
        .risk-score.High { background: #ffedd5; color: #9a3412; }
        .risk-score.Medium { background: #fef3c7; color: #92400e; }
        .risk-score.Low { background: #d1fae5; color: #065f46; }
        .score-num { font-size: 2rem; }
        .score-label { font-size: 0.7rem; text-transform: uppercase; }
        .risk-content { flex: 1; }
        .risk-category {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #6b7280;
            margin-bottom: 4px;
        }
        .risk-name { font-size: 1.25rem; font-weight: 600; color: #111827; margin-bottom: 12px; }
        .risk-reasoning { color: #4b5563; margin-bottom: 12px; }
        .risk-impact {
            background: #f3f4f6;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.875rem;
            color: #6b7280;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #6366f1;
            text-decoration: none;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/ai-advisor" class="back-link">← Back to AI Advisor</a>
        <h1>⚠️ Risk Detection Report</h1>
        
        {% for risk in risks %}
        <div class="risk-card">
            <div class="risk-score {{ risk.level }}">
                <span class="score-num">{{ risk.score }}</span>
                <span class="score-label">{{ risk.level }}</span>
            </div>
            <div class="risk-content">
                <div class="risk-category">{{ risk.category }}</div>
                <div class="risk-name">{{ risk.name }}</div>
                <div class="risk-reasoning">{{ risk.reasoning }}</div>
                <div class="risk-impact">📊 Impact: {{ risk.impact }}</div>
            </div>
        </div>
        {% else %}
        <p style="text-align: center; padding: 60px; color: #6b7280;">
            No significant risks detected. Your business is running smoothly!
        </p>
        {% endfor %}
    </div>
</body>
</html>
